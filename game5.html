    <style>
        body {
            background-color: #0a0c10;

        }
        .container {
            max-width: 800px;

            color: #00ffcc;
            text-decoration: none;

            margin-bottom: 30px;

            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.8;
        }
/* 作品詳細ページのスクリーンショット：自動調整版 */
.screenshot {
  width: 100%;
  max-height: 500px;       /* 大きく見せたい上限。好みで 400〜600 に調整 */
  background: #121824;
  border: 1px solid #334155;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #64748b;
  margin-bottom: 30px;
  overflow: hidden;        /* 画像がはみ出さないようにする */
  padding: 0;
}

/* 画像をコンテナに合わせてスケーリング（縦横どちらでも自然に収まる） */
.screenshot img {
  width: 100%;             /* 親幅に合わせて横幅を最大にする */
  height: auto;            /* 縦横比を保持して高さを自動調整 */
  max-height: 100%;        /* コンテナの max-height を超えない */
  object-fit: contain;     /* 画像全体を見せたい場合は contain（トリミングしない） */
  display: block;
}
 
/* モバイルで高さをさらに抑えたい場合 */
@media (max-width: 600px) {
  .screenshot { max-height: 300px; }
}
        .section-title {
            color: #ff007f;
            margin-top: 40px;
            margin-bottom: 15px;
        }
        p {
            color: #cbd5e1;
            line-height: 1.7;
        }
        /* ゲームプレイボタンのスタイル */
        .play-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff007f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .play-btn:hover {
            background-color: #ff1493;
        }
    </style>
</head>
