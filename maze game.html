<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Maze</title>
    <style>
        body {
            background-color: #0a0c10;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-btn {
            color: #00ffcc;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
        }
        h1 {
            color: #00ffcc;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .game-meta {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .screenshot {
            width: 100%;
            height: 400px;
            background: #121824;
            border: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #64748b;
            margin-bottom: 30px;
        }
        .section-title {
            color: #ff007f;
            margin-top: 40px;
            margin-bottom: 15px;
        }
        p {
            color: #cbd5e1;
            line-height: 1.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">&larr; 作品一覧に戻る</a>

        <h1>⚙️Virtual Maze</h1>
        
        <div class="game-meta">
            <strong>制作者：</strong> 千葉（1年）<br>
            <strong>ジャンル：</strong> 一人称視点迷路ゲーム<br>
            <strong>プレイ時間：</strong> 約10分<br>
            <strong>開発環境：</strong> Pyxel / Python
        </div>

        <div class="screenshot">
              <img src="maze.png" alt="画像" class="game-img__img">
        </div>

        <h3 class="section-title">遊び方</h3>
        <p>
            左右キーで向きを変え、前後キーで移動して迷路のゴールを目指して下さい。右上のアルファベットは今向いている方角を表しています。右上の四角形の中にある緑色の点は現在地を、赤い点はゴールを表しています。
        </p>

       
    </div>

</body>
</html>
